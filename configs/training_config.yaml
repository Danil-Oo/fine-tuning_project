# ==============================================================================
# Конфигурация QLoRA fine-tuning
# Qwen2.5-Coder-1.5B-Instruct | GTX 1650 4GB VRAM
# ==============================================================================

# ── Модель ────────────────────────────────────────────────────────────────────

model_name: "Qwen/Qwen2.5-Coder-1.5B-Instruct"
# Полный HuggingFace hub path. Unsloth скачает модель при первом запуске
# и закэширует локально в ~/.cache/huggingface/

max_seq_length: 560
# Максимальная длина последовательности в токенах.
# Выбрано по анализу данных: p99=459, второй максимум=550.
# Значение 560 покрывает 1104 из 1105 примеров без округления до степени двойки.
# Один выброс (1056 токенов) будет отфильтрован в скрипте обучения.

# ── Квантизация (BitsAndBytes / QLoRA) ───────────────────────────────────────

load_in_4bit: true
# Загружаем веса модели в 4-bit формате вместо стандартного float16/bfloat16.
# Это главный инструмент экономии VRAM: 1.5B параметров займут ~1090 MB
# вместо ~3000 MB в fp16. Без этого модель не влезет в 4GB карточку.

bnb_4bit_quant_type: "nf4"
# Тип 4-bit квантизации. NF4 (NormalFloat4) — специальный формат,
# разработанный именно для квантизации весов нейронных сетей.
# Он оптимален потому что веса LLM распределены нормально (по Гауссу),
# а NF4 равномерно покрывает нормальное распределение своими 16 уровнями.
# Альтернатива — fp4, но NF4 даёт меньше деградации качества.

bnb_4bit_compute_dtype: "bfloat16"
# Тип данных для ВЫЧИСЛЕНИЙ (не для хранения весов).
# Когда модель делает forward pass, веса "распаковываются" из NF4 в bfloat16
# прямо на лету для каждой матричной операции.
# bfloat16 выбран вместо float16: у него тот же размер (2 байта), но
# шире динамический диапазон — меньше риск overflow/underflow в градиентах.

bnb_4bit_use_double_quant: true
# Double quantization — квантизуем не только веса, но и саму константу
# квантизации (scale factor). Даёт дополнительную экономию ~0.4 бит/параметр,
# что для модели 1.5B — примерно 75 MB VRAM. Почти бесплатно по качеству.

# ── LoRA адаптеры ─────────────────────────────────────────────────────────────

lora_r: 16
# Ранг (rank) матриц LoRA. Главный параметр, определяющий ёмкость адаптера.
# LoRA представляет обновление веса как W + A×B, где A имеет размер (d × r),
# B — (r × d). Чем больше r, тем больше параметров обучается и тем больше
# VRAM нужно. r=16 — хороший баланс для датасета ~1100 примеров.
# Если OOM — снижай до 8. Если хочешь больше качества на Kaggle — ставь 32.

lora_alpha: 32
# Масштабирующий коэффициент LoRA. Реальный scaling = lora_alpha / lora_r.
# При alpha=32, r=16: scaling = 2.0 — это эмпирически хорошо работает.
# Правило: держи alpha = 2 * r. Это означает что эффективный learning rate
# для адаптера будет в 2 раза выше, чем lr в оптимизаторе — намеренно.

lora_dropout: 0.05
# Dropout применяется к выходу LoRA-слоёв во время обучения (не инференса).
# 0.05 = 5% нейронов случайно обнуляется — лёгкая регуляризация.
# На маленьких датасетах помогает избежать переобучения.
# При датасете ~1100 примеров это разумно, хотя эффект будет небольшим.

lora_target_modules:
  - "q_proj"    # Query projection — проекция запросов в attention
  - "k_proj"    # Key projection — проекция ключей в attention
  - "v_proj"    # Value projection — проекция значений в attention
  - "o_proj"    # Output projection — финальная проекция после attention
  - "gate_proj" # Gate в SwiGLU FFN — контролирует "пропускную способность"
  - "up_proj"   # Up projection в FFN — расширяет размерность
  - "down_proj" # Down projection в FFN — сжимает обратно
# Это все линейные слои модели Qwen2.5. Покрываем и attention, и FFN —
# стандарт для полноценного QLoRA. Если VRAM не хватает, можно оставить
# только attention (q,k,v,o) — но у нас запас памяти большой, берём всё.

# ── Параметры обучения ────────────────────────────────────────────────────────

output_dir: "/home/danil-pc/fine-tuning_project/adapters/run_01"
# Директория для промежуточных чекпоинтов и финального адаптера.
# SFTTrainer будет сохранять чекпоинты сюда каждые save_steps шагов.

num_train_epochs: 3
# Количество полных проходов по датасету. При 1105 примерах и batch=2:
# 1 эпоха = 553 шага, 3 эпохи = 1659 шагов итого.
# Для датасета такого размера 3 эпохи — разумный старт. Если val_loss
# начнёт расти раньше — early stopping сработает через load_best_model_at_end.

per_device_train_batch_size: 2
# Сколько примеров обрабатывается за один forward+backward pass на GPU.
# Значение 2 выбрано по анализу VRAM: при max_seq_length=560 потребление
# ~1530 MB — у нас огромный запас. Можно было бы взять 4, но 2 безопаснее
# для первого запуска, и effective batch size через grad_accumulation = 8.

gradient_accumulation_steps: 4
# Градиенты накапливаются 4 шага подряд без обнуления.
# Реальный optimizer step происходит раз в 4 шага.
# Effective batch size = per_device_batch(2) × accumulation(4) = 8.
# Это имитирует batch_size=8 при фактическом потреблении памяти от batch=2.
# Большие эффективные батчи дают более стабильные градиенты.

warmup_ratio: 0.05
# Первые 5% шагов learning rate линейно растёт от 0 до target lr.
# 5% от 1659 шагов = ~83 шага разогрева.
# Нужно чтобы модель не "взорвалась" в начале обучения, когда адаптеры
# инициализированы случайно и градиенты нестабильны.

learning_rate: 2.0e-4
# Максимальный learning rate для оптимизатора (после warmup).
# 2e-4 — стандарт для QLoRA/LoRA fine-tuning. Это в 10-100x выше чем
# при full fine-tuning (там обычно 1e-5 — 5e-5), потому что мы обучаем
# только небольшие адаптеры, а не всю модель.

lr_scheduler_type: "cosine"
# Расписание изменения learning rate после warmup.
# Cosine: lr плавно убывает по косинусу от 2e-4 до ~0 к концу обучения.
# Это лучше чем linear decay: в начале lr снижается медленно (широкий поиск),
# к концу — быстро (тонкая подстройка). Стандарт для LLM fine-tuning.

weight_decay: 0.01
# L2-регуляризация: к loss добавляется штраф = 0.01 × сумма(веса²).
# Применяется только к весам адаптера (не к bias и LayerNorm).
# Слабая регуляризация — помогает не переобучиться на маленьком датасете.

optim: "paged_adamw_8bit"
# Оптимизатор с двумя ключевыми свойствами:
# 1) AdamW (Adam + weight decay) — стандарт для трансформеров
# 2) 8-bit квантизация состояний оптимизатора (m и v в Adam хранятся в int8)
#    Это экономит ~75% памяти под оптимизатор vs стандартного fp32 Adam.
# 3) "paged" — при нехватке GPU memory состояния вытесняются в CPU RAM.
# Без этого оптимизатор один мог бы занять 300+ MB, что критично для 4GB.

fp16: true
# float16 отключаем. GTX 1650 поддерживает FP16 Tensor Cores, но они
# менее стабильны (узкий динамический диапазон → риск NaN в градиентах).
# Unsloth сам управляет precision под капотом — вручную не трогаем.

bf16: false
# bfloat16 включаем. На GTX 1650 (Turing) нет аппаратных BF16 ядер,
# поэтому работает через FP32 эмуляцию — чуть медленнее FP16, но
# значительно стабильнее по градиентам. Unsloth это учитывает.

# ── Логирование и сохранение ──────────────────────────────────────────────────

logging_steps: 10
# Каждые 10 шагов trainer вызывает on_log у всех callbacks.
# Туда попадают: train/loss, learning_rate, grad_norm.
# При 1659 шагах итого получим ~166 точек на графике loss — достаточно
# для наблюдения за динамикой обучения.

eval_steps: 50
# Каждые 50 шагов запускается evaluation на val датасете (123 примера).
# Считается eval/loss — только forward pass, без backward.
# Итого ~33 точки eval за всё обучение. Частота оптимальная:
# видим динамику, но не тратим много времени на eval.

save_steps: 100
# Каждые 100 шагов сохраняем чекпоинт в output_dir.
# Итого ~16 чекпоинтов, но реально на диске хранится только 2 (save_total_limit).

save_total_limit: 2
# Максимум 2 чекпоинта на диске одновременно.
# При появлении нового старый удаляется. Плюс отдельно сохраняется
# best model (load_best_model_at_end=True). Экономим место на диске.

# ── MLflow ────────────────────────────────────────────────────────────────────

mlflow_experiment_name: "qwen-coder-finetuning"
# Имя эксперимента в MLflow. Все runs в рамках одного эксперимента
# можно сравнивать между собой в UI (localhost:5000).

mlflow_run_name: "qlora_r16_lr2e4_epochs3_seq560"
# Имя конкретного run. Включаем ключевые гиперпараметры в название —
# так удобно сравнивать runs в MLflow без открытия каждого.
